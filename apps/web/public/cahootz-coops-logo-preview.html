<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cahootz Coops Logo Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbf7e7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #fbf7e7;
        color: #e00008;
      }

      .portal-shell {
        min-height: 100vh;
        background:
          linear-gradient(#d9d4bd 2px, transparent 2px),
          linear-gradient(90deg, #d9d4bd 2px, transparent 2px),
          #fbf7e7;
        background-size: 52px 52px;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .preview {
        width: min(980px, 100%);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="portal-shell">
      <img class="preview" src="/cahootz-coops-logo.svg" alt="Cahootz Coops logo" width="1200" height="760" />
    </main>
  </body>
</html>
